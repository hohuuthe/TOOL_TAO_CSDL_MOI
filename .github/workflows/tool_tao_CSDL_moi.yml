name: Tự động Nhân bản Cấu trúc Supabase

on:
  workflow_dispatch:

jobs:
  quy_trinh_nhan_ban:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Cài đặt PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Khởi tạo thư mục
        run: mkdir -p supabase/migrations

      # --- GIAI ĐOẠN 1: TRÍCH XUẤT VÀ BỔ SUNG DỮ LIỆU CẤU HÌNH ---
      - name: Lấy cấu trúc từ Dự án Gốc
        env:
          PGPASSWORD: ${{ secrets.SOURCE_DB_PASSWORD }}
          ID_GOC: ${{ secrets.SOURCE_PROJECT_ID }}
        run: |
          # Dùng tham số -4 để ép pg_dump kết nối qua IPv4, đổi lại host pooler chung kèm định tuyến user dạng cũ/mới tương thích rộng
          /usr/lib/postgresql/17/bin/pg_dump -4 -h "aws-1-ap-southeast-1.pooler.supabase.com" -p 6543 -U "postgres.$ID_GOC" -d postgres --schema-only --schema=public > supabase/migrations/20260510000000_khoi_tao_cau_truc.sql
          
          # Lọc bỏ các lệnh hệ thống gây lỗi permission trên Supabase
          sed -i '/^CREATE SCHEMA/d; /^ALTER SCHEMA/d; /^CREATE ROLE/d; /^ALTER ROLE/d; /^GRANT/d; /^REVOKE/d; /^CREATE EXTENSION/d; /^ALTER DEFAULT PRIVILEGES/d' supabase/migrations/20260510000000_khoi_tao_cau_truc.sql

          # CHÈN THÊM CÁC DÒNG CẤU HÌNH MẶC ĐỊNH
          cat >> supabase/migrations/20260510000000_khoi_tao_cau_truc.sql <<'EOF'

          -- 1. Khởi tạo tài khoản quản trị
          INSERT INTO public.taikhoan (username, password, fullname, role, chidoan_id)
          VALUES (
              'Admin', 
              '$argon2id$v=19$m=65536,t=3,p=4$PUDXJllthdBNREj7Jd2KTw$blk3GJ2W6Jk/+OxXqPO9quBJtU9mjQqcHb6rYNmBxjM', 
              'Quản trị', 
              'Admin', 
              NULL
          ) ON CONFLICT (username) DO NOTHING;
          
          -- 2. Khởi tạo bảng duy trì CSDL
          INSERT INTO public.duytricsdl (so) 
          VALUES (1) 
          ON CONFLICT DO NOTHING;
          
          -- 3. Khởi tạo cấu hình GitHub
          INSERT INTO public.github_settings (
              id, 
              github_repo_path, 
              github_branch, 
              github_workflow_file, 
              github_restore_workflow_file, 
              github_token
          )
          VALUES (
              'project_02',
              'congty/du_an_backend',
              'main',
              'supabase-backup.yml',
              'supabase-restore.yml',
              'ghp_abc123...'
          ) ON CONFLICT (id) DO NOTHING;
          EOF

      # --- GIAI ĐOẠN 2: ĐẨY LÊN DỰ ÁN MỚI ---
      - name: Đẩy cấu trúc sang Dự án Mới
        env:
          PGPASSWORD: ${{ secrets.TARGET_DB_PASSWORD }}
          ID_MOI: ${{ secrets.TARGET_PROJECT_ID }}
        run: |
          # Tiếp tục ép psql chạy qua IPv4 với tham số -4 kết nối đến host pooler công cộng ổn định
          /usr/lib/postgresql/17/bin/psql -4 -h "aws-1-ap-southeast-1.pooler.supabase.com" -p 6543 -U "postgres.$ID_MOI" -d postgres -f supabase/migrations/20260510000000_khoi_tao_cau_truc.sql

      - name: Lưu trữ bản mẫu
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/
          git commit -m "chore: cập nhật cấu trúc kèm cấu hình github ngày $(date +'%d-%m-%Y')" || echo "Không có thay đổi"
          git push
