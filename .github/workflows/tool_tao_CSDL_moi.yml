name: Tự động Nhân bản Cấu trúc Supabase

on:
  workflow_dispatch:

jobs:
  quy_trinh_nhan_ban:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Cài đặt PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Khởi tạo thư mục
        run: mkdir -p supabase/migrations

      # --- GIAI ĐOẠN 1: TRÍCH XUẤT VÀ BỔ SUNG ADMIN ---
      - name: Lấy cấu trúc từ Dự án Gốc
        env:
          MK_GOC: ${{ secrets.SOURCE_DB_PASSWORD }}
          ID_GOC: ${{ secrets.SOURCE_PROJECT_ID }}
        run: |
          # 1. Trích xuất cấu trúc (Không dùng --clean để tránh lỗi relation does not exist)
          /usr/lib/postgresql/17/bin/pg_dump "postgresql://postgres.$ID_GOC:$MK_GOC@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres" --schema-only --schema=public > supabase/migrations/20260510000000_khoi_tao_cau_truc.sql
          
          # 2. Bắt buộc phải có sed để lọc bỏ các lệnh hệ thống gây lỗi permission denied trên Supabase
          sed -i '/^CREATE SCHEMA/d; /^ALTER SCHEMA/d; /^CREATE ROLE/d; /^ALTER ROLE/d; /^GRANT/d; /^REVOKE/d; /^CREATE EXTENSION/d; /^ALTER DEFAULT PRIVILEGES/d' supabase/migrations/20260510000000_khoi_tao_cau_truc.sql

          # 3. Chèn dữ liệu Admin với mật khẩu Argon2 đã được khôi phục nguyên trạng
          cat >> supabase/migrations/20260510000000_khoi_tao_cau_truc.sql <<'EOF'

          -- Khởi tạo tài khoản quản trị mặc định
          INSERT INTO public.taikhoan (username, password, fullname, role, chidoan_id)
          VALUES (
              'Admin', 
              '$argon2id$v=19$m=65536,t=3,p=4$PUDXJllthdBNREj7Jd2KTw$blk3GJ2W6Jk/+OxXqPO9quBJtU9mjQqcHb6rYNmBxjM', 
              'Quản trị', 
              'Admin', 
              NULL
          ) ON CONFLICT (username) DO NOTHING;
          EOF

      # --- GIAI ĐOẠN 2: ĐẨY LÊN DỰ ÁN MỚI ---
      - name: Đẩy cấu trúc sang Dự án Mới
        env:
          ID_MOI: ${{ secrets.TARGET_PROJECT_ID }}
          MK_MOI: ${{ secrets.TARGET_DB_PASSWORD }}
        run: |
          # Chạy thẳng file SQL vào dự án mới
          /usr/lib/postgresql/17/bin/psql "postgresql://postgres.$ID_MOI:$MK_MOI@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres" -f supabase/migrations/20260510000000_khoi_tao_cau_truc.sql

      - name: Lưu trữ bản mẫu
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/
          git commit -m "chore: cập nhật cấu trúc và admin chính xác PG17 ngày $(date +'%d-%m-%Y')" || echo "Không có thay đổi"
          git push
