name: Tự động Nhân bản Cấu trúc Supabase

on:
  workflow_dispatch: # Kích hoạt thủ công khi bạn có thêm trường mới

jobs:
  quy_trinh_nhan_ban:
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Cài đặt Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/

      - name: Khởi tạo và Đăng nhập
        env:
          MA_TRUY_CAP_SUPABASE: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase init
          supabase login --token "$MA_TRUY_CAP_SUPABASE"

      # --- GIAI ĐOẠN 1: TRÍCH XUẤT CẤU TRÚC TỪ DỰ ÁN GỐC (TRƯỜNG MẪU) ---
      - name: Lấy cấu trúc từ Dự án Gốc
        env:
          ID_DU_AN_GOC: ${{ secrets.SOURCE_PROJECT_ID }}
          MAT_KHAU_CSDL_GOC: ${{ secrets.SOURCE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$ID_DU_AN_GOC" --password "$MAT_KHAU_CSDL_GOC"
          # Lấy toàn bộ định nghĩa bảng, RLS, hàm xử lý (không lấy dữ liệu)
          supabase db pull

      # --- GIAI ĐOẠN 2: TRIỂN KHAI SANG DỰ ÁN MỚI (TRƯỜNG MỚI) ---
      - name: Đẩy cấu trúc sang Dự án Mới
        env:
          ID_DU_AN_MOI: ${{ secrets.TARGET_PROJECT_ID }}
          MAT_KHAU_CSDL_MOI: ${{ secrets.TARGET_DB_PASSWORD }}
        run: |
          # Hủy liên kết cũ để trỏ sang dự án trường mới
          rm -rf .supabase/project-ref
          supabase link --project-ref "$ID_DU_AN_MOI" --password "$MAT_KHAU_CSDL_MOI"
          
          # Đẩy toàn bộ cấu trúc lên (Tạo bảng, Trigger, khóa ngoại CASCADE...)
          supabase db push

      # --- GIAI ĐOẠN 3: LƯU TRỮ BẢN MẪU VÀO GITHUB (TÙY CHỌN) ---
      - name: Lưu trữ cấu trúc vào Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "chore: cập nhật bản mẫu cấu trúc ngày $(date +'%d-%m-%Y')" || echo "Không có thay đổi"
          git push
