name: Auto tao CSDL moi

on:
  workflow_dispatch: # Kích hoạt thủ công khi bạn có trường mới

jobs:
  clone_process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/

      - name: Initialize & Login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase init
          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      # --- GIAI ĐOẠN 1: LẤY CẤU TRÚC TỪ DỰ ÁN GỐC ---
      - name: Pull Schema from Source
        env:
          PROJECT_ID: ${{ secrets.SOURCE_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.SOURCE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$PROJECT_ID" --password "$DB_PASSWORD"
          # Lấy toàn bộ cấu trúc bảng, RLS, Functions về máy ảo GitHub
          supabase db pull

      # --- GIAI ĐOẠN 2: ĐẨY CẤU TRÚC SANG DỰ ÁN MỚI ---
      - name: Push Schema to Target
        env:
          PROJECT_ID: ${{ secrets.TARGET_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.TARGET_DB_PASSWORD }}
        run: |
          # Hủy liên kết cũ và liên kết tới dự án mới
          rm -rf .supabase/project-ref
          supabase link --project-ref "$PROJECT_ID" --password "$DB_PASSWORD"
          
          # Đẩy toàn bộ cấu trúc lên dự án mới (Không bao gồm dữ liệu)
          supabase db push

      # --- GIAI ĐOẠN 3: LƯU TRỮ MẪU (OPTIONAL) ---
      - name: Save Schema to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "chore: cập nhật bản mẫu cấu trúc $(date +'%Y-%m-%d')" || echo "No changes"
          git push
