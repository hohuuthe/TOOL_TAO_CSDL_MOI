name: Tự động Nhân bản Cấu trúc Supabase

on:
  workflow_dispatch:

jobs:
  quy_trinh_nhan_ban:
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Cài đặt Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/

      - name: Khởi tạo dự án
        run: |
          supabase init
          mkdir -p supabase/migrations

      # --- GIAI ĐOẠN 1: TRÍCH XUẤT CẤU TRÚC (ÉP SỬ DỤNG IPV4) ---
      - name: Lấy cấu trúc từ Dự án Gốc
        env:
          MK_GOC: ${{ secrets.SOURCE_DB_PASSWORD }}
          ID_GOC: ${{ secrets.SOURCE_PROJECT_ID }}
        run: |
          # Dùng cổng 6543 nhưng ép qua IPv4 bằng cách thay đổi địa chỉ kết nối
          # Chú ý: postgres.ID_GOC là bắt buộc khi dùng Pooler
          supabase db dump --db-url "postgresql://postgres.$ID_GOC:$MK_GOC@aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=disable" -s public > supabase/migrations/20260510000000_khoi_tao_cau_truc.sql
          
          # Dọn dẹp rác hệ thống trong file SQL
          sed -i '/^CREATE ROLE/d; /^ALTER ROLE/d; /^GRANT/d; /^REVOKE/d' supabase/migrations/20260510000000_khoi_tao_cau_truc.sql

      # --- GIAI ĐOẠN 2: TRIỂN KHAI SANG DỰ ÁN MỚI ---
      - name: Đẩy cấu trúc sang Dự án Mới
        env:
          MA_TRUY_CAP: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ID_MOI: ${{ secrets.TARGET_PROJECT_ID }}
          MK_MOI: ${{ secrets.TARGET_DB_PASSWORD }}
        run: |
          supabase login --token "$MA_TRUY_CAP"
          rm -rf .supabase/project-ref
          supabase link --project-ref "$ID_MOI" --password "$MK_MOI"
          
          # Đẩy cấu trúc lên trường mới
          supabase db push --linked

      - name: Lưu trữ bản mẫu vào GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/
          git commit -m "chore: cập nhật cấu trúc nhân bản IPv4 ngày $(date +'%d-%m-%Y')" || echo "Không có thay đổi"
          git push
