name: Tự động Nhân bản Cấu trúc Supabase

on:
  workflow_dispatch:

jobs:
  quy_trinh_nhan_ban:
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Cài đặt Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/

      - name: Khởi tạo Supabase
        run: supabase init

      # --- GIAI ĐOẠN 1: TRÍCH XUẤT CẤU TRÚC (SỬ DỤNG DUMP) ---
      - name: Lấy cấu trúc từ Dự án Gốc
        env:
          ID_GOC: ${{ secrets.SOURCE_PROJECT_ID }}
          MK_GOC: ${{ secrets.SOURCE_DB_PASSWORD }}
        run: |
          # Dùng lệnh dump để lấy cấu trúc qua chuỗi kết nối trực tiếp
          # Điều này bỏ qua bước tạo login role gây lỗi
          supabase db dump --db-url "postgresql://postgres:$MK_GOC@aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres" --schema public --schema-only > supabase/migrations/20260510000000_khoi_tao_cau_truc.sql

      # --- GIAI ĐOẠN 2: TRIỂN KHAI SANG DỰ ÁN MỚI ---
      - name: Đẩy cấu trúc sang Dự án Mới
        env:
          MA_TRUY_CAP: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ID_MOI: ${{ secrets.TARGET_PROJECT_ID }}
          MK_MOI: ${{ secrets.TARGET_DB_PASSWORD }}
        run: |
          supabase login --token "$MA_TRUY_CAP"
          supabase link --project-ref "$ID_MOI" --password "$MK_MOI"
          
          # Đẩy cấu trúc lên trường mới
          supabase db push

      - name: Lưu trữ bản mẫu
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "chore: cập nhật bản mẫu cấu trúc $(date +'%d-%m-%Y')" || echo "Không có thay đổi"
          git push
